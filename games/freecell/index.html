<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<title>FreeCell &mdash; Arline Arcade</title>
<meta name="description" content="FreeCell — every card face-up, four free cells, and a triple Rewind. Smooth and ad-free.">
<meta name="theme-color" content="#0b6b40">
<link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../../styles/app.css">
<link rel="stylesheet" href="freecell.css">
<link rel="stylesheet" href="../../assets/css/deck-prefs.css">
</head>
<body>
<div id="fcLoad" class="sol-load" role="status" aria-label="Loading">
  <img class="sol-load-logo" src="../../assets/arlinearcade-logo.png" alt="Arline Arcade" decoding="async">
  <div class="sol-load-spinner" aria-hidden="true"></div>
  <p class="sol-load-text">Shuffling the deck&hellip;</p>
</div>
<nav class="topbar">
  <a class="back" href="../../">&#8592; Arcade</a>
  <span class="crumb">FreeCell</span>
</nav>

<div class="sol-bar">
  <button id="newGame" class="btn">New game</button>
  <button id="autoBtn" class="btn ghost">Auto-finish</button>
  <button id="rewindBtn" class="btn ghost rewind" type="button" aria-label="Rewind last move, 3 left" disabled>&#10226; Rewind <span id="rewindChip" class="chip">x3</span></button>
  <span class="moves" id="moves" aria-live="polite">0 moves</span>
  <button class="btn ghost settings-gear" data-settings type="button" aria-label="Settings">&#9881;</button>
</div>

<div id="board" class="board"></div>

<div id="rewindWash" class="rewind-wash" aria-hidden="true"></div>

<div id="win" class="win">
  <div class="panel">
    <div class="big">&#127942;</div>
    <h1>You win!</h1>
    <p>Cleared in <span id="winMoves">0</span> moves</p>
    <button id="winNew" class="btn">New game</button>
  </div>
</div>


<script>setTimeout(function(){var l=document.getElementById('fcLoad');if(l)l.classList.add('gone');},7000);</script>
<script src="../../assets/js/deck-prefs.js"></script>
<script type="module" src="../../assets/js/music.js"></script>
<script type="module" src="freecell.js"></script>
<script type="module" src="../../assets/js/sw-register.js"></script>
</body>
</html>
