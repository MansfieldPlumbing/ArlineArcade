<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Solitaire — Arline Arcade</title>
<meta name="description" content="Klondike Solitaire — tap to play, smooth and ad-free.">
<meta name="theme-color" content="#0b6b40">
<link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../../styles/app.css">
<link rel="stylesheet" href="solitaire.css">
<link rel="stylesheet" href="../../assets/css/deck-prefs.css">
</head>
<body>
<div id="solLoad" class="sol-load" role="status" aria-label="Loading">
  <img class="sol-load-logo" src="../../assets/arlinearcade-logo.png" alt="Arline Arcade" decoding="async">
  <div class="sol-load-spinner" aria-hidden="true"></div>
  <p class="sol-load-text">Shuffling the deck&hellip;</p>
</div>
<nav class="topbar">
  <a class="back" href="../../">&#8592; Arcade</a>
  <img class="topbar-logo" src="../../assets/arlinearcade-logo.png" alt="Arline Arcade">
  <span class="crumb">Solitaire</span>
</nav>

<div class="sol-bar">
  <button id="newGame" class="btn">New game</button>
  <button id="autoBtn" class="btn ghost">Auto-finish</button>
  <span class="moves" id="moves">0 moves</span>
  <button class="btn ghost settings-gear" data-settings type="button" aria-label="Settings">&#9881;</button>
</div>

<div id="board" class="board"></div>

<div id="win" class="win">
  <div class="panel">
    <div class="big">&#127942;</div>
    <h1>You win!</h1>
    <p>Cleared in <span id="winMoves">0</span> moves</p>
    <button id="winNew" class="btn">New game</button>
  </div>
</div>

<button id="musicToggle" class="music-toggle" type="button" aria-label="Toggle music">&#9834;</button>

<script>setTimeout(function(){var l=document.getElementById('solLoad');if(l)l.classList.add('gone');},7000);</script>
<script src="../../assets/js/deck-prefs.js"></script>
<script type="module" src="../../assets/js/music.js"></script>
<script type="module" src="solitaire.js"></script>
<script type="module" src="../../assets/js/sw-register.js"></script>
</body>
</html>
