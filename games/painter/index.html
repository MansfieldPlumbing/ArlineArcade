<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<title>Painter — Arline Arcade</title>
<meta name="description" content="Paint with your finger — big brushes, ten bright colors, one-tap save. Ad-free.">
<meta name="theme-color" content="#0b6b40">
<link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../../styles/app.css">
<link rel="stylesheet" href="painter.css">
</head>
<body>
<nav class="topbar">
  <a class="back" href="../../">&#8592; Arcade</a>
  <span class="crumb">Painter</span>
</nav>

<main class="studio">
  <div class="paper-frame">
    <canvas id="paper" aria-label="Drawing paper. Paint with your finger."></canvas>
  </div>

  <section class="controls" aria-label="Painting controls">
    <div class="swatches" role="group" aria-label="Paint colors">
      <button class="swatch" data-color="#111111" style="--c:#111111" aria-label="Black paint" aria-pressed="true"></button>
      <button class="swatch" data-color="#ffffff" style="--c:#ffffff" aria-label="White paint" aria-pressed="false"></button>
      <button class="swatch" data-color="#e53935" style="--c:#e53935" aria-label="Red paint" aria-pressed="false"></button>
      <button class="swatch" data-color="#fb8c00" style="--c:#fb8c00" aria-label="Orange paint" aria-pressed="false"></button>
      <button class="swatch" data-color="#fdd835" style="--c:#fdd835" aria-label="Yellow paint" aria-pressed="false"></button>
      <button class="swatch" data-color="#43a047" style="--c:#43a047" aria-label="Green paint" aria-pressed="false"></button>
      <button class="swatch" data-color="#1e88e5" style="--c:#1e88e5" aria-label="Blue paint" aria-pressed="false"></button>
      <button class="swatch" data-color="#8e24aa" style="--c:#8e24aa" aria-label="Purple paint" aria-pressed="false"></button>
      <button class="swatch" data-color="#f48fb1" style="--c:#f48fb1" aria-label="Pink paint" aria-pressed="false"></button>
      <button class="swatch" data-color="#795548" style="--c:#795548" aria-label="Brown paint" aria-pressed="false"></button>
    </div>

    <div class="tools">
      <div class="size-group" role="group" aria-label="Brush size">
        <button class="pill size" id="size-small" data-size="small" aria-pressed="false"><span class="dot dot-s"></span>Small</button>
        <button class="pill size" id="size-medium" data-size="medium" aria-pressed="true"><span class="dot dot-m"></span>Medium</button>
        <button class="pill size" id="size-large" data-size="large" aria-pressed="false"><span class="dot dot-l"></span>Large</button>
      </div>
      <button class="pill" id="eraser" aria-pressed="false">Eraser</button>
      <button class="pill" id="undo" disabled aria-label="Undo the last stroke">Undo</button>
      <button class="pill" id="clear" aria-label="Clear the whole picture">Clear</button>
      <button class="pill gold" id="save" aria-label="Save the picture to your device">Save picture</button>
    </div>
  </section>
</main>

<script type="module" src="painter.js"></script>
<script type="module" src="../../assets/js/sw-register.js"></script>
</body>
</html>
